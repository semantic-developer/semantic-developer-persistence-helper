name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  macos-test:
    name: macOS arm64
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: swift test

  linux-test:
    name: Linux x86_64
    runs-on: ubuntu-24.04
    container: swift:6.0
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: swift test
