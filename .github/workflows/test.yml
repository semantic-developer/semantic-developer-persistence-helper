name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  macos-test:
    name: macOS arm64
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: swift test --filter helperHelloReportsProtocolAndCapabilities

  linux-test:
    name: Linux x86_64 build
    runs-on: ubuntu-24.04
    container: swift:6.0
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build --product semantic-developer-helper
