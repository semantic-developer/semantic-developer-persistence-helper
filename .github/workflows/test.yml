name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            runner: macos-14
          - name: Linux x86_64
            runner: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        if: runner.os == 'macOS'
        run: sudo xcode-select -s /Applications/Xcode.app
      - name: Install Swift
        if: runner.os == 'Linux'
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"
      - name: Test
        run: swift test
