name: Release Artifacts

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example v0.1.1
        required: true
        type: string
  push:
    tags:
      - "v*"

jobs:
  macos-build:
    name: semantic-developer-helper-macos-arm64
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Build release artifact
        run: scripts/build-release.sh "${{ steps.version.outputs.value }}"
      - name: Upload helper artifact
        uses: actions/upload-artifact@v4
        with:
          name: semantic-developer-helper-macos-arm64
          path: latest-releases/${{ steps.version.outputs.value }}/semantic-developer-helper-macos-arm64
          if-no-files-found: error
      - name: Upload checksum
        uses: actions/upload-artifact@v4
        with:
          name: semantic-developer-helper-macos-arm64-SHA256SUMS
          path: latest-releases/${{ steps.version.outputs.value }}/SHA256SUMS
          if-no-files-found: error

  linux-build:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.runner }}
    container: swift:6.0
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: semantic-developer-helper-linux-x86_64
            runner: ubuntu-24.04
          - artifact: semantic-developer-helper-linux-arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Build release artifact
        run: scripts/build-release.sh "${{ steps.version.outputs.value }}"
      - name: Upload helper artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: latest-releases/${{ steps.version.outputs.value }}/${{ matrix.artifact }}
          if-no-files-found: error
      - name: Upload checksum
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-SHA256SUMS
          path: latest-releases/${{ steps.version.outputs.value }}/SHA256SUMS
          if-no-files-found: error
